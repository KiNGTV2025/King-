name: Kanal D Scraper

on:
  schedule:
    # Her gün Türkiye saatiyle 03:00'te çalışır (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manuel çalıştırma için

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper beautifulsoup4 requests
    
    - name: Run scraper
      run: python kanald.py
    
    - name: Upload M3U as artifact
      uses: actions/upload-artifact@v4
      with:
        name: kanald-playlist
        path: kanald_playlist.m3u
        retention-days: 7
    
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add kanald_playlist.m3u kanald_cache.json 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update playlist $(date '+%Y-%m-%d %H:%M')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
